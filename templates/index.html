<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Tailor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #161b27;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .logo span { color: #6366f1; }

    .btn {
      padding: 9px 22px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #6366f1;
      color: #fff;
    }

    .btn-primary:hover { background: #5254cc; }
    .btn-primary:disabled { background: #3d3f7a; color: #8b8db8; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #2d3748;
    }

    .btn-ghost:hover { background: #1e2535; color: #e2e8f0; }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d3748;
      overflow: hidden;
    }

    .panel:last-child { border-right: none; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161b27;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .panel-title .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 7px;
    }

    .dot-blue  { background: #6366f1; }
    .dot-green { background: #10b981; }
    .dot-amber { background: #f59e0b; }

    textarea {
      flex: 1;
      width: 100%;
      background: #0f1117;
      color: #cbd5e1;
      border: none;
      outline: none;
      resize: none;
      padding: 18px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      tab-size: 2;
    }

    textarea::placeholder { color: #374151; }

    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-area.empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #374151;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.9rem;
      gap: 10px;
    }

    .output-area.empty svg { opacity: 0.3; }

    .loading-overlay {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #64748b;
      font-size: 0.85rem;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2d3748;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .copy-btn {
      font-size: 0.75rem;
      padding: 5px 12px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #10b981;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: transform 0.25s ease;
      z-index: 999;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .error-msg {
      color: #f87171;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.85rem;
      padding: 18px;
      text-align: center;
    }

    .drop-zone {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .drop-zone textarea {
      flex: 1;
    }

    .drop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(99, 102, 241, 0.12);
      border: 2px dashed #6366f1;
      border-radius: 4px;
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #a5b4fc;
      font-size: 0.9rem;
      font-weight: 500;
      pointer-events: none;
    }

    .drop-overlay svg { opacity: 0.8; }

    .drop-zone.dragging .drop-overlay { display: flex; }

    .pdf-badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      background: #1e2535;
      border: 1px solid #2d3748;
      border-radius: 5px;
      color: #64748b;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Resume<span>Tailor</span></div>
  <button class="btn btn-primary" id="tailorBtn" onclick="tailorResume()">
    ✦ Tailor Resume
  </button>
</header>

<div class="panels">
  <!-- Panel 1: Resume -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title"><span class="dot dot-blue"></span>Your Resume</span>
      <span class="pdf-badge">PDF drop supported</span>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-overlay">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Drop PDF to extract text
      </div>
      <textarea id="resume" placeholder="Paste your resume here, or drop a PDF...&#10;&#10;The formatting will be preserved exactly as-is."></textarea>
    </div>
  </div>

  <!-- Panel 2: Job Description -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title"><span class="dot dot-green"></span>Job Description</span>
    </div>
    <textarea id="jobDesc" placeholder="Paste the job description here...&#10;&#10;Include the full posting for best results."></textarea>
  </div>

  <!-- Panel 3: Output -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title"><span class="dot dot-amber"></span>Tailored Resume</span>
      <div id="outputActions" style="display:none; gap:6px; align-items:center;">
        <button class="btn btn-ghost copy-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
        <button class="btn btn-ghost copy-btn" id="pdfBtn" onclick="downloadPdf()">Download PDF</button>
      </div>
    </div>

    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <span>Tailoring your resume…</span>
    </div>

    <div class="output-area empty" id="output">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Your tailored resume will appear here
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
  let currentResumeJson = null;

  async function tailorResume() {
    const resume = document.getElementById('resume').value.trim();
    const jobDesc = document.getElementById('jobDesc').value.trim();
    const btn = document.getElementById('tailorBtn');
    const output = document.getElementById('output');
    const loading = document.getElementById('loading');
    const actions = document.getElementById('outputActions');

    if (!resume) { alert('Please paste your resume.'); return; }
    if (!jobDesc) { alert('Please paste the job description.'); return; }

    btn.disabled = true;
    btn.textContent = 'Working…';
    output.style.display = 'none';
    loading.style.display = 'flex';
    actions.style.display = 'none';
    currentResumeJson = null;

    try {
      const res = await fetch('/tailor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resume, job_description: jobDesc })
      });

      const data = await res.json();

      loading.style.display = 'none';
      output.style.display = 'block';

      if (data.error) {
        output.className = 'output-area';
        output.innerHTML = `<span class="error-msg">${data.error}</span>`;
      } else {
        output.className = 'output-area';
        output.textContent = data.tailored_resume;
        currentResumeJson = data.resume_json;
        actions.style.display = 'flex';
        // Hide PDF button if JSON parsing failed
        document.getElementById('pdfBtn').style.display = currentResumeJson ? 'block' : 'none';
      }
    } catch (err) {
      loading.style.display = 'none';
      output.style.display = 'block';
      output.className = 'output-area';
      output.innerHTML = `<span class="error-msg">Something went wrong. Make sure the server is running and your API key is set.</span>`;
    }

    btn.disabled = false;
    btn.textContent = '✦ Tailor Resume';
  }

  function copyOutput() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }

  async function downloadPdf() {
    if (!currentResumeJson) return;
    const btn = document.getElementById('pdfBtn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    try {
      const res = await fetch('/download-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resume_json: currentResumeJson })
      });

      if (!res.ok) {
        const err = await res.json();
        alert('PDF error: ' + (err.error || 'Unknown error'));
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (currentResumeJson.name || 'Resume').replace(/ /g, '_') + '_Tailored.pdf';
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('Failed to generate PDF. Make sure the server is running.');
    }

    btn.disabled = false;
    btn.textContent = 'Download PDF';
  }

  // Allow Ctrl+Enter to trigger tailoring
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') tailorResume();
  });

  // PDF drag-and-drop
  const dropZone = document.getElementById('dropZone');
  let dragCounter = 0;

  dropZone.addEventListener('dragenter', e => {
    e.preventDefault();
    dragCounter++;
    if (hasPdf(e)) dropZone.classList.add('dragging');
  });

  dropZone.addEventListener('dragleave', () => {
    dragCounter--;
    if (dragCounter === 0) dropZone.classList.remove('dragging');
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
  });

  dropZone.addEventListener('drop', async e => {
    e.preventDefault();
    dragCounter = 0;
    dropZone.classList.remove('dragging');

    const file = [...e.dataTransfer.files].find(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (!file) return;

    await extractPdf(file);
  });

  function hasPdf(e) {
    return [...(e.dataTransfer?.items || [])].some(
      i => i.type === 'application/pdf' || i.type === ''
    );
  }

  async function extractPdf(file) {
    const resumeArea = document.getElementById('resume');
    const originalPlaceholder = resumeArea.placeholder;
    resumeArea.placeholder = 'Extracting text from PDF…';
    resumeArea.disabled = true;

    try {
      const form = new FormData();
      form.append('file', file);

      const res = await fetch('/upload-pdf', { method: 'POST', body: form });
      const data = await res.json();

      if (data.error) {
        alert('PDF error: ' + data.error);
      } else {
        resumeArea.value = data.text;
      }
    } catch {
      alert('Failed to extract PDF. Make sure the server is running.');
    }

    resumeArea.disabled = false;
    resumeArea.placeholder = originalPlaceholder;
  }
</script>

</body>
</html>
